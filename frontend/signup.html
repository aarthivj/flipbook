<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Droidal - Join the Adventure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --pri: #6366f1; --accent: #a855f7; --bg-dark: #030712; }
        body, html { height: 100%; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: white; overflow: hidden; }
        .main-container { height: 100vh; display: flex; }
        .visual-side { flex: 1.3; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 60px; overflow: hidden; }
        .planet-main { position: absolute; width: 450px; height: 450px; background: linear-gradient(135deg, #22d3ee 0%, #6366f1 100%); border-radius: 50%; top: -80px; left: -80px; box-shadow: inset -30px -30px 60px rgba(0,0,0,0.5), 0 0 80px rgba(34, 211, 238, 0.2); opacity: 0.9; }
        .planet-secondary { position: absolute; width: 180px; height: 180px; background: linear-gradient(135deg, #a855f7 0%, #4338ca 100%); border-radius: 50%; top: 40%; right: 15%; box-shadow: inset -15px -15px 30px rgba(0,0,0,0.4), 0 0 40px rgba(168, 85, 247, 0.2); }
        .brand-logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; color: white; display: flex; align-items: center; gap: 10px; position: relative; z-index: 10; }
        .adventure-title { font-size: 3.8rem; font-weight: 900; line-height: 1; margin-top: auto; margin-bottom: 20px; text-transform: uppercase; max-width: 450px; position: relative; z-index: 10; }
        .form-side { flex: 1; background-color: #030712; display: flex; align-items: center; justify-content: center; padding: 40px; border-left: 1px solid rgba(255,255,255,0.05); }
        .login-card { width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 40px; }
        .form-header h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; }
        .form-header p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px; }
        .input-group-custom { position: relative; margin-bottom: 20px; }
        .input-group-custom i { position: absolute; left: 16px; top: 15px; color: #64748b; z-index: 5; }
        .form-control-custom { background: rgba(30, 41, 59, 0.5) !important; border: 1px solid #334155 !important; border-radius: 12px !important; padding: 12px 16px 12px 48px !important; color: white !important; transition: 0.3s; width: 100%; outline: none; }
        .form-control-custom:focus { border-color: var(--pri) !important; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2) !important; }
        .btn-signup { width: 100%; padding: 14px; background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%); border: none; border-radius: 12px; color: white; font-weight: 700; margin-top: 10px; transition: 0.3s; }
        .btn-signup:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .footer-text { margin-top: 30px; font-size: 0.75rem; color: #64748b; text-align: center; }
        .footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="visual-side">
            <div class="planet-main"></div>
            <div class="planet-secondary"></div>
            <div class="brand-logo"><i class="fa-solid fa-wand-magic-sparkles" style="color: var(--pri);"></i> DROIDAL</div>
            <h1 class="adventure-title">Create your account!</h1>
        </div>
        <div class="form-side">
            <div class="login-card">
                <div class="form-header">
                    <h2>SIGN UP</h2>
                    <p>Enter a username and password to start your design adventure.</p>
                </div>
                <div class="input-group-custom">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="user" class="form-control-custom" placeholder="Choose Username" autocomplete="off">
                </div>
                <div class="input-group-custom">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="pass" class="form-control-custom" placeholder="Create Password">
                </div>
                <button class="btn-signup" onclick="doSignup()">Create Account</button>
                <p class="footer-text">Already have an account? <a href="/">Sign In</a></p>
            </div>
        </div>
    </div>
    <script>
        async function doSignup() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            if(!user || !pass) return alert("Please fill in both fields");
            
            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if(res.ok) {
                    alert("Account created! Please sign in.");
                    window.location.href = "/";
                } else {
                    const err = await res.json();
                    alert(err.detail || "Signup failed");
                }
            } catch (err) {
                alert("Could not connect to server.");
            }
        }
    </script>
</body>
</html>
