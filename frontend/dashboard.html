<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Droidal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#06080f;
  --void:#080c16;
  --card:#0d1220;
  --lift:#121929;
  --rim:rgba(255,255,255,0.06);
  --rim2:rgba(255,255,255,0.12);
  --violet:#7b5ef8;
  --violet2:#a78bfa;
  --glow:rgba(123,94,248,0.18);
  --amber:#f59e0b;
  --text:#dde3f0;
  --muted:#475569;
  --faint:#1e2d47;
}

html{scroll-behavior:smooth}

body{
  background:var(--void);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ═══ ANIMATED BG ═══ */
.bg-canvas{
  position:fixed;inset:0;z-index:0;
  overflow:hidden;pointer-events:none;
}
.orb{
  position:absolute;border-radius:50%;
  filter:blur(90px);opacity:0.55;
  animation:drift 18s ease-in-out infinite alternate;
}
.orb-1{
  width:600px;height:600px;
  top:-200px;left:-150px;
  background:radial-gradient(circle,rgba(123,94,248,0.4),transparent 70%);
  animation-duration:22s;
}
.orb-2{
  width:500px;height:500px;
  bottom:-100px;right:-100px;
  background:radial-gradient(circle,rgba(99,168,255,0.22),transparent 70%);
  animation-duration:26s;animation-delay:-8s;
}
.orb-3{
  width:300px;height:300px;
  top:40%;left:50%;
  background:radial-gradient(circle,rgba(245,158,11,0.12),transparent 70%);
  animation-duration:19s;animation-delay:-4s;
}
@keyframes drift{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(60px,40px) scale(1.12)}
}

body::after{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ═══ NAVBAR ═══ */
nav{
  position:sticky;top:0;z-index:200;
  height:60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
  background:rgba(6,8,15,0.72);
  backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--rim);
}
.logo{
  font-family:'Syne',sans-serif;
  font-weight:800;font-size:1.18rem;
  letter-spacing:0.06em;text-transform:uppercase;
  color:#fff;display:flex;align-items:center;gap:10px;
}
.logo-gem{
  width:28px;height:28px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.logo-gem svg{filter:drop-shadow(0 0 8px var(--violet));}

.nav-sign{
  display:flex;align-items:center;gap:8px;
  font-size:0.8rem;font-weight:500;color:var(--muted);
  cursor:pointer;padding:8px 14px;border-radius:8px;
  border:1px solid transparent;transition:all 0.2s;
}
.nav-sign:hover{color:var(--text);border-color:var(--rim2);background:rgba(255,255,255,0.04);}

/* ═══ HERO ═══ */
.hero{
  position:relative;z-index:10;
  padding:60px 40px 0;
  max-width:1120px;margin:0 auto;
}
.hero-eyebrow{
  font-size:0.7rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--violet2);margin-bottom:18px;
  display:flex;align-items:center;gap:10px;
}
.hero-eyebrow::before{
  content:'';display:block;width:32px;height:1px;background:var(--violet2);
}

.hero-headline{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.8rem,6vw,5.2rem);
  font-weight:100;line-height:0.95;
  color:#fff;letter-spacing:-0.03em;
}
.hero-headline .line2{
  display:block;
  background:linear-gradient(90deg,var(--violet),var(--violet2),#a5d8ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

.hero-row{
  display:flex;align-items:center;gap:24px;margin-bottom:20px;flex-wrap:wrap;
}
.hero-sub{font-size:0.9rem;color:var(--muted);max-width:340px;line-height:1.6;}

.cta-create{
  margin-left:auto;
  display:flex;align-items:center;gap:12px;
  background:var(--violet);
  color:#fff;font-family:'Syne',sans-serif;
  font-weight:700;font-size:0.88rem;letter-spacing:0.05em;text-transform:uppercase;
  border:none;padding:16px 28px;border-radius:14px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform 0.2s,box-shadow 0.2s;
  box-shadow:0 0 0 1px rgba(123,94,248,0.5),0 8px 32px rgba(123,94,248,0.4);
}
.cta-create::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.18),transparent 60%);
  pointer-events:none;
}
.cta-create:hover{transform:translateY(-3px);box-shadow:0 0 0 1px rgba(123,94,248,0.7),0 16px 48px rgba(123,94,248,0.55);}
.cta-create:active{transform:translateY(0);}
.cta-icon{
  width:30px;height:30px;border-radius:8px;
  background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;transition:transform 0.2s;
}
.cta-create:hover .cta-icon{transform:rotate(90deg);}

/* ═══ SECTION ═══ */
.section-wrap{
  position:relative;z-index:10;
  max-width:1120px;margin:0 auto;padding:0 40px 80px;
}
.sec-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;padding-bottom:16px;
  border-bottom:1px solid var(--rim);
}
.sec-label{
  font-family:'Syne',sans-serif;
  font-size:0.68rem;font-weight:700;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--muted);
}
.sec-count{
  background:var(--faint);color:var(--violet2);
  font-size:0.65rem;font-weight:700;letter-spacing:0.08em;
  padding:3px 9px;border-radius:20px;margin-left:10px;
  display:inline-block;
}
.refresh-link{
  font-size:0.78rem;color:var(--muted);font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:7px;
  padding:6px 10px;border-radius:8px;transition:all 0.2s;
  border:none;background:none;font-family:'DM Sans',sans-serif;
}
.refresh-link:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.refresh-link i{transition:transform 0.4s;}
.refresh-link:hover i{transform:rotate(180deg);}

/* ═══ PROJECT GRID ═══ */
.project-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(248px,1fr));
  gap:20px;
}

.empty-state{
  grid-column:1/-1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 24px;gap:18px;
  border:1.5px dashed rgba(123,94,248,0.2);
  border-radius:20px;
}
.empty-icon{
  font-size:2.5rem;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
.empty-msg{font-size:0.88rem;color:var(--muted);}
.empty-cta{
  color:var(--violet2);font-size:0.85rem;font-weight:600;
  cursor:pointer;text-decoration:none;
  display:flex;align-items:center;gap:6px;
  transition:gap 0.2s;
}
.empty-cta:hover{gap:10px;}

/* PROJECT CARD */
.project-card{
  background:var(--card);
  border:1px solid var(--rim);
  border-radius:18px;overflow:hidden;
  cursor:pointer;position:relative;
  transition:border-color 0.25s,transform 0.25s,box-shadow 0.25s;
  animation:cardIn 0.4s ease both;
}
.project-card:hover{
  border-color:rgba(123,94,248,0.45);
  transform:translateY(-5px) scale(1.015);
  box-shadow:0 24px 64px rgba(0,0,0,0.5),0 0 0 1px rgba(123,94,248,0.12),0 0 40px rgba(123,94,248,0.08);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.card-thumb{
  height:150px;position:relative;overflow:hidden;
  background:var(--lift);
}
.thumb-bg{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#0f1829 0%,#1a1040 50%,#0c1525 100%);
}
.thumb-lines{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(123,94,248,0.08) 1px, transparent 1px),
    linear-gradient(90deg,rgba(123,94,248,0.08) 1px, transparent 1px);
  background-size:28px 28px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);
}
.thumb-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 60% at 50% 110%,rgba(123,94,248,0.3),transparent);
}
.thumb-pages{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;
}
.thumb-page{
  border-radius:4px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  transition:transform 0.4s;
  width:34px;height:44px;
}
.thumb-page:nth-child(1){transform:rotate(-8deg) translateX(-2px);}
.thumb-page:nth-child(2){transform:rotate(-2deg);}
.thumb-page:nth-child(3){transform:rotate(6deg) translateX(2px);}
.project-card:hover .thumb-page:nth-child(1){transform:rotate(-18deg) translateX(-8px) translateY(-3px);}
.project-card:hover .thumb-page:nth-child(3){transform:rotate(16deg) translateX(8px) translateY(-3px);}

.card-body{padding:16px 18px 18px;}
.card-name{
  font-family:'Syne',sans-serif;
  font-size:0.95rem;font-weight:700;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:12px;
}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-type{
  font-size:0.58rem;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--violet2);
  background:rgba(123,94,248,0.12);
  border:1px solid rgba(123,94,248,0.2);
  padding:3px 10px;border-radius:20px;
}
.card-date{font-size:0.65rem;color:var(--muted);}

.dot-btn{
  position:absolute;top:12px;right:12px;z-index:20;
  width:32px;height:32px;border-radius:9px;
  background:rgba(6,8,15,0.7);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.5);font-size:0.8rem;
  cursor:pointer;transition:all 0.2s;
  opacity:0;
}
.project-card:hover .dot-btn{opacity:1;}
.dot-btn:hover{background:rgba(240,84,84,0.2);color:#fca5a5;border-color:rgba(240,84,84,0.3);}

.menu-dropdown{
  position:absolute;top:48px;right:12px;z-index:300;
  background:#131c2e;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;display:none;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  overflow:hidden;min-width:150px;
}
.menu-dropdown.show{display:block;}
.menu-item{
  padding:12px 16px;font-size:0.8rem;font-weight:500;
  color:#fca5a5;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:background 0.15s;
}
.menu-item:hover{background:rgba(240,84,84,0.12);}

/* ═══ MODAL ═══ */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(14px);
  display:none;align-items:center;justify-content:center;
}
.modal-box{
  background:var(--card);
  width:90%;max-width:440px;
  border-radius:24px;
  border:1px solid rgba(123,94,248,0.25);
  box-shadow:0 0 0 1px rgba(123,94,248,0.08),0 50px 100px rgba(0,0,0,0.7);
  overflow:hidden;
  animation:popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{
  from{opacity:0;transform:scale(0.88) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.modal-stripe{
  height:4px;
  background:linear-gradient(90deg,var(--violet),var(--violet2),#7dd3fc);
}
.modal-head{
  padding:22px 26px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.modal-head h3{
  font-family:'Syne',sans-serif;
  font-size:1.1rem;font-weight:800;color:#fff;
  letter-spacing:-0.01em;
}
.modal-close{
  background:rgba(255,255,255,0.06);border:1px solid var(--rim);
  color:var(--muted);font-size:1rem;
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.modal-close:hover{background:rgba(255,255,255,0.1);color:#fff;}
.modal-body{padding:0 26px 20px;}
.field-label{
  font-size:0.7rem;font-weight:600;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;
}
#newProjectName{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,0.04);
  border:1.5px solid var(--rim2);
  border-radius:12px;color:#fff;
  font-family:'DM Sans',sans-serif;font-size:0.98rem;
  outline:none;transition:0.2s;
}
#newProjectName:focus{
  border-color:var(--violet);
  background:rgba(123,94,248,0.05);
  box-shadow:0 0 0 4px rgba(123,94,248,0.14);
}
#newProjectName::placeholder{color:var(--muted);}
.error-text{color:#f05454;font-size:0.73rem;margin-top:8px;display:none;}
.modal-foot{
  padding:16px 26px;
  background:rgba(0,0,0,0.25);border-top:1px solid var(--rim);
  display:flex;justify-content:flex-end;gap:10px;
}
.btn-cancel{
  background:none;border:1px solid var(--rim2);
  color:var(--muted);font-family:'DM Sans',sans-serif;
  font-weight:600;font-size:0.84rem;
  padding:11px 20px;border-radius:10px;cursor:pointer;
  transition:all 0.2s;
}
.btn-cancel:hover{border-color:rgba(255,255,255,0.2);color:var(--text);}
.btn-confirm{
  background:linear-gradient(135deg,var(--violet),#6d28d9);
  color:#fff;border:none;
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:0.82rem;letter-spacing:0.05em;text-transform:uppercase;
  padding:11px 24px;border-radius:10px;cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 6px 20px rgba(123,94,248,0.4);
}
.btn-confirm:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(123,94,248,0.55);}
.btn-confirm:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* ═══ LOADER ═══ */
.loading-backdrop{
  position:fixed;inset:0;z-index:9998;
  background:rgba(6,8,15,0.8);backdrop-filter:blur(6px);display:none;
}
.loading-overlay{
  position:fixed;inset:0;z-index:9999;
  display:none;align-items:center;justify-content:center;
}
.loading-overlay.show{display:flex;}
.loading-card{
  background:var(--card);
  border:1px solid rgba(123,94,248,0.2);
  border-radius:20px;padding:36px 56px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}
.loading-ring{
  width:40px;height:40px;position:relative;
}
.loading-ring::before,
.loading-ring::after{
  content:'';position:absolute;inset:0;border-radius:50%;
}
.loading-ring::before{border:3px solid rgba(123,94,248,0.15);}
.loading-ring::after{
  border:3px solid transparent;
  border-top-color:var(--violet);
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{
  font-family:'Syne',sans-serif;
  font-size:0.85rem;font-weight:700;
  letter-spacing:0.06em;text-transform:uppercase;color:var(--text);
}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="loading-backdrop" id="loadingBackdrop"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-card">
    <div class="loading-ring"></div>
    <div class="loading-text">Loading…</div>
  </div>
</div>

<nav>
  <div class="logo">
    <div class="logo-gem">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <polygon points="11,2 20,8 17,19 5,19 2,8" fill="none" stroke="#7b5ef8" stroke-width="1.5"/>
        <polygon points="11,6 16,9.5 14,16 8,16 6,9.5" fill="#7b5ef8" opacity="0.4"/>
        <polygon points="11,2 20,8 11,6" fill="#a78bfa" opacity="0.7"/>
      </svg>
    </div>
    DROIDAL
  </div>
  <div class="nav-sign" onclick="logout()">
    <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign out
  </div>
</nav>

<section class="hero">
  <div class="hero-eyebrow">Your workspace</div>
  <h1 class="hero-headline">
    Make it<br>
    <span class="line2">flip.</span>
  </h1>
  <div class="hero-row">
    <p class="hero-sub">Design stunning flipbook animations and share them with the world.</p>
    <button class="cta-create" onclick="startNewProject('flipbook')">
      <span class="cta-icon"><i class="fa-solid fa-plus"></i></span>
      New Flipbook
    </button>
  </div>
</section>

<section class="section-wrap">
  <div class="sec-bar">
    <div style="display:flex;align-items:center;">
      <span class="sec-label">Recent Projects</span>
      <span class="sec-count" id="projectCount">—</span>
    </div>
    <button class="refresh-link" onclick="loadProjects()">
      <i class="fa-solid fa-rotate-right"></i> Refresh
    </button>
  </div>
  <div id="recentProjects" class="project-grid"></div>
</section>

<div id="projectModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-stripe"></div>
    <div class="modal-head">
      <h3>New Flipbook</h3>
      <button class="modal-close" onclick="closeProjectModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <label class="field-label" for="newProjectName">Project Name</label>
      <input type="text" id="newProjectName" placeholder="e.g. Summer Vibes, Brand Story…" autocomplete="off">
      <div id="modalError" class="error-text">Please enter a project name</div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeProjectModal()">Cancel</button>
      <button class="btn-confirm" id="confirmProjectBtn">Create →</button>
    </div>
  </div>
</div>

<script>
async function loadProjects(){
  const u=getUser();if(!u)return;
  document.getElementById('loadingBackdrop').style.display='block';
  document.getElementById('loadingOverlay').classList.add('show');
  try{
    const res=await fetch(`/api/projects/${u.user_id}`);
    const projects=await res.json();
    const list=document.getElementById('recentProjects');
    document.getElementById('projectCount').textContent=projects.length||'0';
    if(!projects.length){
      list.innerHTML=`<div class="empty-state">
        <div class="empty-icon">📖</div>
        <p class="empty-msg">No flipbooks yet. The canvas is yours.</p>
        <a class="empty-cta" onclick="startNewProject('flipbook')">Create your first <i class="fa-solid fa-arrow-right"></i></a>
      </div>`;
    }else{
      list.innerHTML=projects.map((p,i)=>{
        const d=new Date(p.created_at||Date.now());
        const date=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        const previewSrc=(p.cover_page&&p.cover_page.length>0)?p.cover_page:(p.preview_bg&&p.preview_bg.length>0)?p.preview_bg:null;
        const thumbHTML=previewSrc
          ?`<div class="card-thumb" style="background:#000;">
               <img src="${previewSrc}" style="width:100%;height:100%;object-fit:cover;object-position:top center;display:block;transition:transform 0.4s ease;" draggable="false"/>
               <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(8,12,22,0.7) 100%);pointer-events:none;"></div>
             </div>`
          :`<div class="card-thumb">
               <div class="thumb-bg"></div>
               <div class="thumb-lines"></div>
               <div class="thumb-glow"></div>
               <div class="thumb-pages">
                 <div class="thumb-page"></div>
                 <div class="thumb-page"></div>
                 <div class="thumb-page"></div>
               </div>
             </div>`;
        return `<div class="project-card" style="animation-delay:${i*60}ms">
          <div class="dot-btn" onclick="toggleMenu(event,${p.id})"><i class="fa-solid fa-ellipsis"></i></div>
          <div id="menu-${p.id}" class="menu-dropdown">
            <div class="menu-item" onclick="deleteProject(event,${p.id})"><i class="fa-solid fa-trash-can"></i> Delete</div>
          </div>
          <div onclick="openProject(${p.id})">
            ${thumbHTML}
            <div class="card-body">
              <div class="card-name">${p.title}</div>
              <div class="card-footer">
                <span class="card-type">${p.project_type}</span>
                <span class="card-date">${date}</span>
              </div>
            </div>
          </div>
        </div>`;
      }).join('');
    }
  }catch(e){
    document.getElementById('recentProjects').innerHTML=
      '<div class="empty-state"><p style="color:#f05454">Failed to load. Try refreshing.</p></div>';
  }finally{
    document.getElementById('loadingBackdrop').style.display='none';
    document.getElementById('loadingOverlay').classList.remove('show');
  }
}

function getUser(){
  const s=localStorage.getItem('droidal_user');
  if(!s){window.location.href='/';return null;}
  return JSON.parse(s);
}
function toggleMenu(e,id){
  e.stopPropagation();
  document.querySelectorAll('.menu-dropdown').forEach(m=>{if(m.id!==`menu-${id}`)m.classList.remove('show');});
  document.getElementById(`menu-${id}`).classList.toggle('show');
  document.addEventListener('click',()=>document.getElementById(`menu-${id}`)?.classList.remove('show'),{once:true});
}
async function deleteProject(e,id){
  e.stopPropagation();
  if(!confirm("Delete this flipbook? This can't be undone."))return;
  try{const res=await fetch(`/api/projects/delete/${id}`,{method:'DELETE'});if(res.ok)loadProjects();else alert("Delete failed.");}
  catch(err){console.error(err);}
}
let currentProjectType='';
function startNewProject(type){
  currentProjectType=type;
  const inp=document.getElementById('newProjectName');
  const err=document.getElementById('modalError');
  inp.value='';inp.style.borderColor='';err.style.display='none';
  document.getElementById('projectModal').style.display='flex';
  setTimeout(()=>inp.focus(),80);
}
function closeProjectModal(){
  document.getElementById('projectModal').style.display='none';
  const b=document.getElementById('confirmProjectBtn');
  b.disabled=false;b.textContent='Create →';
}
async function confirmNewProject(){
  const inp=document.getElementById('newProjectName');
  const err=document.getElementById('modalError');
  const btn=document.getElementById('confirmProjectBtn');
  const title=inp.value.trim();
  if(!title){inp.style.borderColor='#f05454';err.style.display='block';inp.focus();return;}
  inp.style.borderColor='';
  btn.disabled=true;btn.textContent='Creating…';
  const u=getUser();if(!u)return;
  try{
    const res=await fetch('/api/projects/save',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title,type:currentProjectType,user_id:u.user_id,data:[null]})
    });
    const r=await res.json();
    if(r.id){closeProjectModal();window.location.href=`/editor?id=${r.id}&new=true`;}
    else throw new Error('No ID');
  }catch(e){
    alert('Failed: '+e.message);
    btn.disabled=false;btn.textContent='Create →';
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('confirmProjectBtn').onclick=confirmNewProject;
  document.getElementById('newProjectName').onkeydown=e=>{
    if(e.key==='Enter')confirmNewProject();
    if(e.key==='Escape')closeProjectModal();
  };
});
function openProject(id){window.location.href=`/editor?id=${id}`;}
function logout(){localStorage.removeItem('droidal_user');window.location.href='/';}
loadProjects();
</script>
</body>
</html>
