<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Droidal - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pri: #6366f1; --bg: #0f172a; --panel: #1e293b; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .hub-container { max-width: 1100px; margin: 50px auto; padding: 20px; }
        
        /* New Project Section */
        .hero-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px; margin-bottom: 50px; 
        }
        .create-card {
            background: white; border-radius: 12px; padding: 30px 20px;
            text-align: center; cursor: pointer; border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            color: #334155;
        }
        .create-card:hover { 
            border-color: var(--pri); transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            background: #f8faff;
        }
        .create-card i { font-size: 2.5rem; color: var(--pri); margin-bottom: 15px; display: block; }
        .create-card h3 { margin: 0; font-size: 1.1rem; font-weight: 700; }

        /* Recent Projects Section */
        .project-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 25px; 
        }
        .project-card {
            background: var(--panel); border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            transition: 0.2s;
        }
        .project-card:hover { transform: scale(1.02); border-color: var(--pri); }
        .project-preview {
            height: 140px; background: #334155; display: flex;
            align-items: center; justify-content: center; font-size: 3rem; color: #94a3b8;
        }
        .project-info { padding: 15px; }
        .project-info h3 { margin: 0 0 5px 0; font-size: 1rem; color: white; }
        .project-type-tag {
            font-size: 0.65rem; background: rgba(99, 102, 241, 0.2); padding: 3px 10px;
            border-radius: 4px; text-transform: uppercase; color: #a5b4fc; font-weight: 600;
        }

        .navbar { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .brand { font-weight: 800; color: var(--pri); font-size: 1.3rem; }
        .logout { color: #94a3b8; cursor: pointer; font-size: 0.9rem; }
        .logout:hover { color: white; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand">✦ Droidal</div>
        <div class="logout" onclick="logout()">Logout <i class="fa-solid fa-right-from-bracket"></i></div>
    </div>

    <div class="hub-container">
        <h1 style="margin-bottom: 30px;">Start a new project</h1>
        
        <div class="hero-grid">
            <div class="create-card" onclick="startNewProject('flipbook')">
                <i class="fa-solid fa-book-open"></i>
                <h3>Flipbook</h3>
            </div>
            <div class="create-card" onclick="startNewProject('doc')">
                <i class="fa-solid fa-file-lines"></i>
                <h3>Document</h3>
            </div>
            <div class="create-card" onclick="startNewProject('presentation')">
                <i class="fa-solid fa-display"></i>
                <h3>Presentation</h3>
            </div>
        </div>

        <h2 style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            Recent Projects
            <button style="background: none; border: none; color: var(--pri); cursor: pointer; font-size: 0.9rem;" onclick="loadProjects()">Refresh</button>
        </h2>
        <div id="recentProjects" class="project-grid">
            </div>
    </div>

    <script>
        async function loadProjects() {
            const userStr = localStorage.getItem('droidal_user');
            if(!userStr) return window.location.href = '/';
            
            const user = JSON.parse(userStr);
            const res = await fetch(`/api/projects/${user.user_id}`);
            const projects = await res.json();
            
            const list = document.getElementById('recentProjects');
            if(projects.length === 0) {
                list.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #94a3b8; padding: 40px;">No projects yet. Create your first one above!</div>';
                return;
            }

            list.innerHTML = projects.map(p => `
                <div class="project-card" onclick="openProject(${p.id})">
                    <div class="project-preview">📄</div>
                    <div class="project-info">
                        <h3>${p.title}</h3>
                        <span class="project-type-tag">${p.project_type}</span>
                    </div>
                </div>
            `).join('');
        }

        async function startNewProject(type) {
            const title = prompt("Enter project name:", `My New ${type}`);
            if(!title) return;

            const user = JSON.parse(localStorage.getItem('droidal_user'));
            const payload = {
                title: title,
                type: type,
                user_id: user.user_id,
                data: [null] // Initial empty page
            };

            const res = await fetch('/api/projects/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            
            if(result.id) openProject(result.id);
        }

        function openProject(id) {
            // Send the project ID to the editor via URL parameter
            window.location.href = `/editor?id=${id}`;
        }

        function logout() {
            localStorage.removeItem('droidal_user');
            window.location.href = '/';
        }

        loadProjects();
    </script>
</body>
</html>
