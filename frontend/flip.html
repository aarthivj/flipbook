<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Droidal – Flipbook Preview</title>
 <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>


<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@400;700&family=Oswald:wght@400;700&family=Montserrat:wght@400;600;700&family=Poppins:wght@400;600&family=Raleway:wght@400;700&family=Lato:wght@400;700&family=Open+Sans:wght@400;600&family=Merriweather:wght@400;700&family=Dancing+Script:wght@600&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#0f172a;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 20px 60px;font-family:'Inter',sans-serif;overflow:hidden}
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 20% 30%,rgba(16,185,129,.15) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(59,130,246,.15) 0%,transparent 50%);pointer-events:none;z-index:0}
        .book-wrapper{text-align:center;position:relative;z-index:1}
        #book{width:840px;height:600px;position:relative;margin:0 auto 20px;transition:transform .6s cubic-bezier(.4,0,.2,1)}
        .my-page{background-color:#ffffff;position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;box-shadow:inset 0 0 1px rgba(0,0,0,.1)}
        .my-page::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.008) 2px,rgba(0,0,0,.008) 4px);pointer-events:none;opacity:.6;z-index:50}
        .interactive-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
        .interactive-layer div,.interactive-layer a,.interactive-layer video{pointer-events:auto}
        .loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a4d68;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease;gap:14px}
        .loading-overlay.hidden{opacity:0;pointer-events:none}
        .loader{width:48px;height:48px;border:4px solid rgba(16,185,129,.2);border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite}
        .load-txt{color:rgba(255,255,255,.65);font-size:.85rem;font-weight:500}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty-state{display:none;flex-direction:column;align-items:center;gap:12px;text-align:center;color:#fff;z-index:2;padding:40px}
        .empty-state.show{display:flex}
        .empty-state h2{font-size:1.3rem;font-weight:700}
        .empty-state p{color:rgba(255,255,255,.6);font-size:.88rem;max-width:360px}
        .empty-state a{margin-top:8px;padding:10px 22px;background:#6366f1;color:#fff;border-radius:8px;text-decoration:none;font-weight:600}
        .empty-state a:hover{background:#4f46e5}
        .ctrl-bar{position:fixed;bottom:0;left:0;right:0;height:50px;background:rgba(15,23,42,.96);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:100}
        .cb-side{display:flex;align-items:center;gap:7px}
        .cb-center{display:flex;align-items:center;gap:5px}
        .cb-btn{padding:5px 13px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);cursor:pointer;font-size:.78rem;font-weight:500;font-family:'Inter',sans-serif;transition:.15s}
        .cb-btn:hover{background:rgba(255,255,255,.15);color:#fff}
        .cb-btn.pri{background:#6366f1;border-color:#6366f1;color:#fff}
        .cb-btn.pri:hover{background:#4f46e5}
        .pg-ind{color:rgba(255,255,255,.5);font-size:.78rem;font-weight:500;min-width:72px;text-align:center}
        .dot-wrap{display:flex;gap:5px;align-items:center}
        .p-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;border:none;transition:.15s}
        .p-dot.a{background:#6366f1;width:9px;height:9px}
        .p-dot:hover{background:rgba(255,255,255,.5)}
        .update-banner{display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#6366f1;color:#fff;padding:9px 18px;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;z-index:200;box-shadow:0 4px 18px rgba(99,102,241,.4);white-space:nowrap}
        .update-banner.show{display:block}
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadOverlay">
        <div class="loader"></div>
        <div class="load-txt" id="loadTxt">Loading your book...</div>
    </div>
    <div class="empty-state" id="emptyState">
        <h2>📚 No pages found</h2>
        <p>Open the Droidal Editor, add content to the canvas, then click <strong>Preview</strong>.</p>
        <a href="editor.html">← Open Editor</a>
    </div>
    <div class="book-wrapper">
        <div id="book"></div>
    </div>
    <div class="ctrl-bar">
        <div class="cb-side"><button class="cb-btn" onclick="goPrev()">← Prev</button></div>
        <div class="cb-center">
            <div class="dot-wrap" id="dotWrap"></div>
            <span class="pg-ind" id="pgInd">Page 1</span>
        </div>
        <div class="cb-side">
            <button class="cb-btn" onclick="goNext()">Next →</button>
            <button class="cb-btn pri" onclick="window.open('editor.html','_blank')">✏️ Edit</button>
        </div>
    </div>
    <div class="update-banner" id="updateBanner" onclick="location.reload()">📝 Editor updated — click to reload</div>
    <audio id="pageSound" preload="auto">
    <source src="/sounds/flip_page.mp3" type="audio/mpeg">
</audio>

<script>
    document.addEventListener("click", () => {
    const s = document.getElementById("pageSound");
    if (s) s.play().then(()=>s.pause()).catch(()=>{});
}, { once: true });

const BOOK_ID = 'droidal_book';
const LS_KEY  = `droidal_pages_${BOOK_ID}`;
const PAGE_W  = 420;
const PAGE_H  = 594;

let pageFlip   = null;
let totalPages = 0;

// Stores one fabric.Canvas per page index so we can replay animations on flip
const pageCanvases = {};

// ─── BOOT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    setTxt('Loading pages...');

    const params = new URLSearchParams(window.location.search);
    const pId    = params.get('id');
    let pagesData = null;

    // 1. Try DB if project id is in URL
    if (pId) {
        try {
            const r    = await fetch(`/api/project/${pId}`);
            const proj = await r.json();
            pagesData  = proj.data.map((json, i) => ({ page_number: i, canvas_json: json }));
        } catch (e) { console.warn('DB load failed, falling back to localStorage', e); }
    }

    // 2. Fallback: localStorage
    if (!pagesData) pagesData = await loadPages();

    // 3. Nothing found → show empty state
    if (!pagesData || !pagesData.length) {
        document.getElementById('loadOverlay').classList.add('hidden');
        document.getElementById('emptyState').classList.add('show');
        return;
    }

    setTxt(`Rendering ${pagesData.length} page(s)...`);
    await buildDOM(pagesData);
    initFlip();

    window.addEventListener('storage', e => {
        if (e.key === LS_KEY) document.getElementById('updateBanner').classList.add('show');
    });
});

// ─── LOAD FROM LOCALSTORAGE ───────────────────────────────────────────────────
async function loadPages() {
    try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) {
            const a = JSON.parse(raw);
            if (Array.isArray(a) && a.length) {
                a.sort((x, y) => x.page_number - y.page_number);
                return a;
            }
        }
    } catch (e) {}
    return null;
}

// ─── BUILD DOM ────────────────────────────────────────────────────────────────
async function buildDOM(pagesData) {
    const bookEl = document.getElementById('book');
    bookEl.innerHTML = '';

    const renderList = [...pagesData];

    // page-flip needs an even number of pages for the spread layout
    if (renderList.length % 2 !== 0) {
        renderList.push({ page_number: 999, canvas_json: null });
    }

    totalPages = pagesData.length; // real count (no blank padding)

    for (let i = 0; i < renderList.length; i++) {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'my-page';

        const cvEl = document.createElement('canvas');
        cvEl.id = `rc-${i}`;

        const overlay = document.createElement('div');
        overlay.className = 'interactive-layer';

        pageDiv.appendChild(cvEl);
        pageDiv.appendChild(overlay);
        bookEl.appendChild(pageDiv);

        await renderPage(cvEl.id, renderList[i].canvas_json, overlay, i);
    }
}

// ─── RENDER ONE PAGE ──────────────────────────────────────────────────────────
async function renderPage(canvasId, jsonData, overlay, pageIndex) {
    return new Promise(resolve => {
        const sc = new fabric.Canvas(canvasId, {
            width: PAGE_W,
            height: PAGE_H,
            interactive: false,
            selection: false
        });

        // Store reference — playPageAnimations() needs this later
        pageCanvases[pageIndex] = sc;

        if (!jsonData) {
            sc.backgroundColor = '#ffffff';
            sc.renderAll();
            return resolve();
        }

        const data = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;

        sc.loadFromJSON(data, () => {
            sc.renderAll();

            // Build interactive overlays (video / external link / page jump)
            sc.getObjects().forEach(obj => {
                obj.setCoords();
                const rect = obj.getBoundingRect();

                // VIDEO
                if (obj.customVideoSrc) {
                    const vid       = document.createElement('video');
                    vid.crossOrigin = 'anonymous';
                    vid.src         = obj.customVideoSrc.startsWith('http')
                        ? obj.customVideoSrc
                        : `http://127.0.0.1:8000${obj.customVideoSrc}`;
                    vid.autoplay    = true;
                    vid.muted       = true;
                    vid.loop        = true;
                    vid.playsInline = true;
                    vid.style.cssText = `position:absolute;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;object-fit:cover;z-index:5;pointer-events:none;`;
                    vid.oncanplay = () => vid.play().catch(() => {});
                    overlay.appendChild(vid);
                }

                // EXTERNAL LINK
                if (obj.customLink) {
                    const a  = document.createElement('a');
                    a.href   = obj.customLink;
                    a.target = '_blank';
                    a.style.cssText = `position:absolute;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;cursor:pointer;pointer-events:auto;z-index:10;`;
                    overlay.appendChild(a);
                }

                // PAGE JUMP
if (obj.customPageTarget != null) {

    const btn = document.createElement('div');

    btn.style.cssText = `
        position:absolute;
        left:${rect.left}px;
        top:${rect.top}px;
        width:${rect.width}px;
        height:${rect.height}px;
        cursor:pointer;
        pointer-events:auto;
        z-index:9999;
        background:transparent;
    `;
btn.onclick = e => {
    e.preventDefault();
    e.stopPropagation();

    console.log("Jump clicked:", obj.customPageTarget);

    let page = parseInt(obj.customPageTarget) + 1; // convert index → page

    if (!pageFlip || isNaN(page)) return;

    const total = pageFlip.getPageCount();
    let flipIndex;

    if (page === 1) {
        flipIndex = 0;
    } 
    else if (page === total) {
        flipIndex = total - 1;
    } 
    else {
        const spreadPage = (page % 2 === 0) ? page : page - 1;
        flipIndex = spreadPage - 1;
    }

    console.log("Real page:", page, "Flip index:", flipIndex);

    pageFlip.turnToPage(flipIndex);   // 🔥 IMPORTANT CHANGE
};
    overlay.appendChild(btn);
}

});

            resolve();
        });
    });
}

// ─── ANIMATION ENGINE ─────────────────────────────────────────────────────────
// Called when a page becomes visible — plays from each object's current position
function playPageAnimations(pageIndex) {
    const sc = pageCanvases[pageIndex];
    if (!sc) return;

    sc.getObjects().forEach(obj => {
        if (!obj.animData) return;

        const d      = obj.animData;
        const dur    = d.duration || 800;
        const render = sc.renderAll.bind(sc);

        // Always read current position — never a stored snapshot
        const origLeft    = obj.left;
        const origTop     = obj.top;
        const origOpacity = obj.opacity != null ? obj.opacity : 1;
        const origScaleX  = obj.scaleX  != null ? obj.scaleX  : 1;
        const origScaleY  = obj.scaleY  != null ? obj.scaleY  : 1;

        switch (d.type) {
            case 'fade':
                obj.set('opacity', 0);
                obj.animate('opacity', origOpacity, { duration: dur, onChange: render });
                break;

            case 'pop':
                obj.set({ scaleX: 0.01, scaleY: 0.01 });
                obj.animate({ scaleX: origScaleX, scaleY: origScaleY }, {
                    duration: dur, easing: fabric.util.ease.easeOutBack, onChange: render
                });
                break;

            case 'slideL':
                obj.set('left', origLeft + 100);
                obj.animate('left', origLeft, { duration: dur, easing: fabric.util.ease.easeOutCubic, onChange: render });
                break;

            case 'slideR':
                obj.set('left', origLeft - 100);
                obj.animate('left', origLeft, { duration: dur, easing: fabric.util.ease.easeOutCubic, onChange: render });
                break;

            case 'slideU':
                obj.set('top', origTop + 100);
                obj.animate('top', origTop, { duration: dur, easing: fabric.util.ease.easeOutCubic, onChange: render });
                break;

            case 'slideD':
                obj.set('top', origTop - 100);
                obj.animate('top', origTop, { duration: dur, easing: fabric.util.ease.easeOutCubic, onChange: render });
                break;

            case 'bounce':
                obj.animate('top', origTop - 50, {
                    duration: dur / 2, easing: fabric.util.ease.easeOutCubic, onChange: render,
                    onComplete: () => obj.animate('top', origTop, {
                        duration: dur / 2, easing: fabric.util.ease.easeOutBounce, onChange: render
                    })
                });
                break;

            case 'pulse':
                obj.animate({ scaleX: origScaleX * 1.2, scaleY: origScaleY * 1.2 }, {
                    duration: dur / 2, onChange: render,
                    onComplete: () => obj.animate({ scaleX: origScaleX, scaleY: origScaleY }, {
                        duration: dur / 2, onChange: render
                    })
                });
                break;

            case 'shake':
                obj.animate('left', origLeft - 10, { duration: 80, onChange: render,
                    onComplete: () => obj.animate('left', origLeft + 10, { duration: 80, onChange: render,
                        onComplete: () => obj.animate('left', origLeft - 8, { duration: 80, onChange: render,
                            onComplete: () => obj.animate('left', origLeft + 8, { duration: 80, onChange: render,
                                onComplete: () => obj.animate('left', origLeft, { duration: 80, onChange: render })
                            })
                        })
                    })
                });
                break;

            case 'float':
                obj.animate('top', origTop - 15, {
                    duration: dur / 2, easing: fabric.util.ease.easeInOutSine, onChange: render,
                    onComplete: () => obj.animate('top', origTop, {
                        duration: dur / 2, easing: fabric.util.ease.easeInOutSine, onChange: render
                    })
                });
                break;
        }
    });
}

// ─── INIT FLIPBOOK ────────────────────────────────────────────────────────────
function initFlip() {
    const bookEl    = document.getElementById('book');
    const pageSound = document.getElementById('pageSound');

    pageFlip = new St.PageFlip(bookEl, {
        width: PAGE_W,
        height: PAGE_H,
        size: 'fixed',
        showCover: true,
        usePortrait: false,
        flippingTime: 800,
        drawShadow: true,
        maxShadowOpacity: 0.5,
        showPageCorners: true,
        useMouseEvents: true,
        clickEventForward: true
    });

    pageFlip.loadFromHTML(document.querySelectorAll('#book .my-page'));

    function recenter(idx) {
        const total = pageFlip.getPageCount();
        if (idx === 0)           bookEl.style.transform = 'translateX(-210px)';
        else if (idx >= total-1) bookEl.style.transform = 'translateX(210px)';
        else                     bookEl.style.transform = 'translateX(0px)';
    }

    recenter(0);
    setTimeout(() => document.getElementById('loadOverlay').classList.add('hidden'), 500);

    // On every flip → play animations for the newly visible spread
  pageFlip.on('flip', e => {

    const pageSound = document.getElementById("pageSound");

    if(pageSound){
        pageSound.pause();
        pageSound.currentTime = 0.65;
        pageSound.play().catch(()=>{});
    }

    recenter(e.data);
    updateUI(e.data);

    playPageAnimations(e.data);
    playPageAnimations(e.data + 1);
});


    buildDots();
    updateUI(0);

    // Play first-page animations after loader disappears
    setTimeout(() => playPageAnimations(0), 600);
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function updateUI(idx) {
    const ind = document.getElementById('pgInd');
    const total = pageFlip.getPageCount();
    let label = "";

    if (idx === 0) {
        label = "Page 1 (Cover)";
    } else if (idx >= total - 1) {
        label = `Page ${total} (Back Cover)`;
    } else {
        // Since spreads start on ODD indices (idx), 
        // the left page is idx + 1 and the right is idx + 2
        const left = idx + 1;
        const right = idx + 2;
        label = `Pages ${left} - ${right}`;
    }
    
    if (ind) ind.textContent = label;

    // Update Dots: Each dot represents one "view" (one spread or one cover)
    const viewIdx = idx === 0 ? 0 : Math.ceil(idx / 2);
    document.querySelectorAll('.p-dot').forEach((d, i) => {
        d.classList.toggle('a', i === viewIdx);
    });
}

function buildDots() {
    const wrap = document.getElementById('dotWrap');
    if (!wrap) return;
    wrap.innerHTML = '';
    
    const total = pageFlip.getPageCount();
    // Total Views = 1 (Cover) + (Internal Spreads) + 1 (Back Cover)
    const totalViews = Math.floor(total / 2) + 1; 

    for (let i = 0; i < totalViews; i++) {
        const d = document.createElement('button');
        d.className = 'p-dot' + (i === 0 ? ' a' : '');
        d.onclick = () => {
            if (pageFlip) {
                // Map the view index back to the starting physical index
                // View 0 -> Index 0
                // View 1 -> Index 1 (Pages 2/3)
                // View 2 -> Index 3 (Pages 4/5)
                const targetIdx = (i === 0) ? 0 : (i * 2) - 1;
                pageFlip.flip(targetIdx);
            }
        };
        wrap.appendChild(d);
    }
}
function setTxt(t) { document.getElementById('loadTxt').textContent = t; }
function goPrev()  { if (pageFlip) pageFlip.flipPrev(); }
function goNext()  { if (pageFlip) pageFlip.flipNext(); }
</script>
</body>
</html>
