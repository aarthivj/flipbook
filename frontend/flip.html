/* ─── SPINE CENTER CRACK LINE ─── */

        rgba(0,0,0,0.90) 50%,

    transition: opacity 0.3s ease;

#book.flipping::after {
    opacity: 0;
    transition: opacity 0.15s ease;
}

#book::before {
    z-index: 0;
}

#book::after {
    z-index: 0;
}
#book {
    overflow: hidden;

<script>

/* ════════════════════════════════════════
   GLOSS SYSTEM
════════════════════════════════════════ */
let glossEnabled = true;

function injectGlossLayers() {
    document.querySelectorAll('.my-page').forEach((page, idx) => {
        if (page.querySelector('.page-gloss')) return;

        // Static gloss coat
        const gloss = document.createElement('div');
        gloss.className = 'page-gloss';
        page.appendChild(gloss);

        // Moving specular — alternate angle per page side
        const spec = document.createElement('div');
        spec.className = 'page-specular';
        if (idx % 2 !== 0) {
            spec.style.background = `linear-gradient(
                75deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0) 38%,
                rgba(255,255,255,0.20) 47%,
                rgba(255,255,255,0.30) 50%,
                rgba(255,255,255,0.20) 53%,
                rgba(255,255,255,0) 62%,
                rgba(255,255,255,0) 100%
            )`;
        }
        page.appendChild(spec);

        // Spine edge highlight
        const edge = document.createElement('div');
        edge.className = 'page-edge';
        if (idx % 2 === 0) {
            edge.style.cssText = 'left:0; background: linear-gradient(to right, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.0) 100%);';
        } else {
            edge.style.cssText = 'right:0; background: linear-gradient(to left, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.0) 100%);';
        }
        page.appendChild(edge);
    });
}

function animateFlipShine(pageEl) {
    if (!glossEnabled || !pageEl) return;
    const spec = pageEl.querySelector('.page-specular');
    if (!spec) return;
    spec.style.transition = 'none';
    spec.style.opacity = '0';
    spec.style.left = '-60%';
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            spec.style.transition = 'left 0.75s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.12s ease';
            spec.style.opacity = '1';
            spec.style.left = '100%';
            setTimeout(() => {
                spec.style.transition = 'opacity 0.2s ease';
                spec.style.opacity = '0';
            }, 680);
        });
    });
}


/* ════════════════════════════════════════
   BACKGROUND SWITCHER
   — committed choice is stored in the URL (?bg=...)
   — so anyone opening the same shared link sees the same background
════════════════════════════════════════ */
(function(){
    const btn   = document.getElementById('bg-menu-btn');
    const panel = document.getElementById('bg-panel');
    let snapshot = null;

    /* ── helpers: read/write the ?bg= URL param ── */
    function getBgFromURL(){
        try{ return new URLSearchParams(window.location.search).get('bg') || null; }catch(e){ return null; }
    }
    function setBgInURL(value){
    const u = new URL(window.location.href);
    // Only store gradients/colors in URL — never base64 (too large)
    const isBase64 = value && value.startsWith('data:');
    if(value && !isBase64) u.searchParams.set('bg', value);
    else u.searchParams.delete('bg');  // base64: remove from URL, DB only
    window.history.replaceState(null, '', u.toString());

    // Save to server regardless
    const pathParts = window.location.pathname.split('/');
    const share_id  = pathParts[1] === 'preview' ? pathParts[2] : null;
    const pId       = new URLSearchParams(window.location.search).get('id');
    const id        = share_id || pId;
    if (id) {
        fetch('/api/projects/save-bg', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ share_id, project_id: pId, preview_bg: value })
        }).catch(()=>{});
    }
}
   
    /* ── apply raw value (a gradient, color hex, image URL, or base64) to <body> ── */
    function applyValue(val){
        if(!val){
            document.body.style.backgroundImage = '';
            document.body.style.backgroundColor = '#0f172a';
            return;
        }
        if(val.startsWith('linear-gradient') || val.startsWith('radial-gradient')){

    /* ── snapshot / revert for hover-preview ── */
    function snap(){
        snapshot={
            img: document.body.style.backgroundImage,
            col: document.body.style.backgroundColor,
            sz:  document.body.style.backgroundSize,
            pos: document.body.style.backgroundPosition
        };
    }
    function revert(){
        if(!snapshot) return;
        document.body.style.backgroundImage    = snapshot.img;
        document.body.style.backgroundColor   = snapshot.col;
        document.body.style.backgroundSize     = snapshot.sz;
        document.body.style.backgroundPosition = snapshot.pos;

    let revertTimer = null;

document.querySelectorAll('.bg-opt').forEach(function(opt){

async function loadPages() {

            if (Array.isArray(a) && a.length) {
                a.sort((x, y) => x.page_number - y.page_number);
                return a;
            }
        }

// ─── BUILD DOM ────────────────────────────────────────────────────────────────
async function buildDOM(pagesData) {
    const bookEl = document.getElementById('book');
    bookEl.innerHTML = '';

    totalPages = pagesData.length;
    const renderList = [...pagesData];

    // Odd page count: duplicate the last page so it appears as the right side of
    // the final content spread AND again as the single back cover.
    // Even page count: no change needed — last page lands on its own naturally.
    //   9 pages → 1(cover) | 2-3 | 4-5 | 6-7 | 8-9 | 9(back cover)
    //  10 pages → 1(cover) | 2-3 | 4-5 | 6-7 | 8-9 | 10(back cover)
    if (renderList.length % 2 !== 0) {
        const lastPage = renderList[renderList.length - 1];
        renderList.push({ ...lastPage, isDuplicate: true });
    }

    for (let i = 0; i < renderList.length; i++) {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'my-page';

        const cvEl = document.createElement('canvas');
        cvEl.id = `rc-${i}`;

        const overlay = document.createElement('div');
        overlay.className = 'interactive-layer';

        pageDiv.appendChild(cvEl);
        pageDiv.appendChild(overlay);
        bookEl.appendChild(pageDiv);

        await renderPage(cvEl.id, renderList[i].canvas_json, overlay, i);
    
    }
    injectGlossLayers();

}

                    top:    rawRect.top    / dpr,
                    width:  rawRect.width  / dpr,
                    height: rawRect.height / dpr,

function fabricClipToCss(clipPathObj, parent) {
    if (!clipPathObj) return '';
    const cp   = clipPathObj;
    const type = (cp.type || '').toLowerCase();
    try {
        if (type === 'rect') {
            const w  = cp.width  * (cp.scaleX || 1);
            const h  = cp.height * (cp.scaleY || 1);
            const ox = cp.left + parent.width  / 2 - w / 2;
            const oy = cp.top  + parent.height / 2 - h / 2;
            const r  = cp.rx   || cp.cornerRadius || 0;
            return `inset(${oy}px ${parent.width - ox - w}px ${parent.height - oy - h}px ${ox}px${r ? ' round ' + r + 'px' : ''})`;
        }
        if (type === 'circle') {
            const r  = cp.radius * (cp.scaleX || 1);
            const cx = cp.left + parent.width  / 2;
            const cy = cp.top  + parent.height / 2;
            return `circle(${r}px at ${cx}px ${cy}px)`;
        }
        if (type === 'ellipse') {
            const rx = cp.rx * (cp.scaleX || 1);
            const ry = cp.ry * (cp.scaleY || 1);
            const cx = cp.left + parent.width  / 2;
            const cy = cp.top  + parent.height / 2;
            return `ellipse(${rx}px ${ry}px at ${cx}px ${cy}px)`;
        }
        if (type === 'polygon' && cp.points) {
            const cx = cp.left + parent.width  / 2;
            const cy = cp.top  + parent.height / 2;
            const sx = cp.scaleX || 1;
            const sy = cp.scaleY || 1;
            const pts = cp.points.map(p => `${cx + p.x * sx}px ${cy + p.y * sy}px`).join(', ');
            return `polygon(${pts})`;
        }
        if (type === 'path' && cp.path) {
            const d = cp.path.map(seg => seg.join(' ')).join(' ');
            return `path('${d}')`;
        }
    } catch (e) {
        console.warn('[VideoClip] Could not convert clipPath to CSS:', e);
    }
    return '';
}

function reviveVideoGroup(fabObj, targetCanvas, overlay, rect, pageIndex) {
    // For video-in-frame groups, fabObj is the GROUP. Get the image child for rendering.
    let renderTarget = fabObj;
    let clipSource    = fabObj;

    if (fabObj.isVideoGroup && fabObj.type === 'group') {
        const children  = fabObj._objects || [];
        const imgChild  = children.find(c => c.type === 'image');
        if (imgChild) {
            imgChild.customVideoSrc = fabObj.customVideoSrc;
            imgChild.isVideoFabric  = true;
            renderTarget = imgChild;
        }
        clipSource = fabObj; // clipPath lives on the group
    }

    const videoSrc = fabObj.customVideoSrc;
    if (!videoSrc) return;

    const vid = document.createElement('video');
    vid.src         = videoSrc;
    vid.loop        = true;
    vid.muted       = true;
    vid.playsInline = true;
    vid.crossOrigin = 'anonymous';
    vid.preload     = 'auto';
    vid.pause();

    if (!pageVideos[pageIndex]) pageVideos[pageIndex] = [];
    const vidEntry = { vid, active: false, loopId: null };
    pageVideos[pageIndex].push(vidEntry);

    if (clipSource.clipPath) {
        clipSource.clipPath.absolutePositioned = false;
        clipSource.clipPath.objectCaching      = false;
    }
    fabObj.objectCaching      = false;
    fabObj.dirty              = true;
    renderTarget.objectCaching = false;

    function startLoop(v) {
        const vw     = renderTarget.width  || v.videoWidth  || 320;
        const vh     = renderTarget.height || v.videoHeight || 240;
        const off    = document.createElement('canvas');
        off.width    = vw;
        off.height   = vh;
        const offCtx = off.getContext('2d');

        renderTarget._offCanvas = off;
        renderTarget._render = function(ctx) {
            if (!this._offCanvas) return;
            ctx.drawImage(this._offCanvas, -this.width / 2, -this.height / 2, this.width, this.height);
        };

        // Mark group dirty so Fabric re-renders children each frame
        if (fabObj.type === 'group') {
            fabObj.objectCaching = false;
        }

        function drawLoop() {
            // Use targetCanvas (the page canvas) — NOT fabObj.canvas which is null for group children
            if (!targetCanvas) return;
            if (vidEntry.active && !v.paused && !v.ended) {
                offCtx.drawImage(v, 0, 0, vw, vh);
                if (fabObj.type === 'group') fabObj.dirty = true;
                else renderTarget.dirty = true;
                targetCanvas.renderAll();
            }
            vidEntry.loopId = requestAnimationFrame(drawLoop);
        }
        vidEntry.loopId = requestAnimationFrame(drawLoop);

        // Build the play/mute control overlay
        const ctrlWrap = document.createElement('div');
        ctrlWrap.className = 'vid-wrap';
        ctrlWrap.style.cssText = `left:${rect.left}px; top:${rect.top}px; width:${rect.width}px; height:${rect.height}px; background:transparent; pointer-events:all;`;

        // CSS clip from the group's clipPath
        const cssClip = fabricClipToCss(clipSource.clipPath, fabObj);
        if (cssClip) ctrlWrap.style.clipPath = cssClip;

        const bar = document.createElement('div');
        bar.className = 'vid-ctrl-bar';

        let isPlaying = false;
        let isMuted   = true;

        const btnPlay = makeCtrlBtn('fa-play', e => {
            e.stopPropagation();
            if (isPlaying) {
                vid.pause();
                vidEntry.active = false;
                btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else {
                vid.play().catch(console.error);
                vidEntry.active = true;
                btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i>';
            }
            isPlaying = !isPlaying;
        });

        const btnMute = makeCtrlBtn('fa-volume-xmark', e => {
            e.stopPropagation();
            isMuted   = !isMuted;
            vid.muted = isMuted;
            btnMute.innerHTML = isMuted
                ? '<i class="fa-solid fa-volume-xmark"></i>'
                : '<i class="fa-solid fa-volume-high"></i>';
        });

        bar.appendChild(btnPlay);
        bar.appendChild(btnMute);
        ctrlWrap.appendChild(bar);
        overlay.appendChild(ctrlWrap);

        vidEntry.setPlaying = (val) => {
            isPlaying = val;
            btnPlay.innerHTML = isPlaying
                ? '<i class="fa-solid fa-pause"></i>'
                : '<i class="fa-solid fa-play"></i>';
        };
    }

    if (vid.readyState >= 2) {
        startLoop(vid);
    } else {
        vid.addEventListener('loadeddata', () => startLoop(vid), { once: true });
    }
}




function createPlainVideoOverlay(obj, overlay, rect, pageIndex) {
    const vidWrap = document.createElement('div');
    vidWrap.className = 'vid-wrap';
    vidWrap.style.cssText = `left:${rect.left}px; top:${rect.top}px; width:${rect.width}px; height:${rect.height}px;`;

    const cssClip = fabricClipToCss(obj.clipPath, obj);
    if (cssClip) vidWrap.style.clipPath = cssClip;

    const vid = document.createElement('video');
    vid.src         = obj.customVideoSrc;
    vid.loop        = true;
    vid.muted       = true;
    vid.playsInline = true;
    vid.crossOrigin = 'anonymous';
    vid.preload     = 'auto';
    vid.style.cssText = 'width:100%; height:100%; object-fit:cover; display:block; pointer-events:none;';
    vid.pause();

    const bar = document.createElement('div');
    bar.className = 'vid-ctrl-bar';

    let isPlaying = false;
    let isMuted   = true;

    const btnPlay = makeCtrlBtn('fa-play', e => {
        e.stopPropagation();
        if (isPlaying) {
            vid.pause();
            btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
        } else {
            vid.play().catch(console.error);
            btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i>';
        }
        isPlaying = !isPlaying;
    });

    const btnMute = makeCtrlBtn('fa-volume-xmark', e => {
        e.stopPropagation();
        isMuted   = !isMuted;
        vid.muted = isMuted;
        btnMute.innerHTML = isMuted
            ? '<i class="fa-solid fa-volume-xmark"></i>'
            : '<i class="fa-solid fa-volume-high"></i>';
    });

    bar.appendChild(btnPlay);
    bar.appendChild(btnMute);
    vidWrap.appendChild(vid);
    vidWrap.appendChild(bar);
    overlay.appendChild(vidWrap);

    if (!pageVideos[pageIndex]) pageVideos[pageIndex] = [];
    pageVideos[pageIndex].push({
        vid,
        active: false,
        loopId: null,
        setPlaying: (val) => {
            isPlaying = val;
            btnPlay.innerHTML = isPlaying
                ? '<i class="fa-solid fa-pause"></i>'
                : '<i class="fa-solid fa-play"></i>';
        },
        isPlayingRef: () => isPlaying
    });
}

function makeCtrlBtn(iconClass, onClick) {
    const btn = document.createElement('button');
    btn.className = 'vid-ctrl-btn';
    btn.innerHTML = `<i class="fa-solid ${iconClass}"></i>`;
    btn.addEventListener('mousedown', e => e.stopPropagation());
    btn.addEventListener('click', onClick);
    return btn;
}

function startPageVideos(pageIndex) {
    const entries = pageVideos[pageIndex];
    if (!entries) return;
    entries.forEach(entry => {
        entry.vid.loop = false;
        entry.vid.currentTime = 0;
        entry.active = true;
        entry.vid.play().then(() => {
            if (entry.setPlaying) entry.setPlaying(true);
        }).catch(console.warn);
        // Auto-stop UI when video naturally ends
        entry.vid.onended = () => {
            entry.active = false;
            if (entry.setPlaying) entry.setPlaying(false);
        };
    });
}

function stopPageVideos(pageIndex) {
    const entries = pageVideos[pageIndex];
    if (!entries) return;
    entries.forEach(entry => {
        entry.active = false;
        entry.vid.pause();
        entry.vid.currentTime = 0;
        if (entry.setPlaying) entry.setPlaying(false);
    });
}

// ─── ANIMATION ENGINE ─────────────────────────────────────────────────────────
const playedPages = new Set();

function playPageAnimations(pageIndex) {
    const sc = pageCanvases[pageIndex];
    if (!sc) return;

    sc.getObjects().forEach(obj => {
        if (!obj.animData) return;

        const d      = obj.animData;
        const dur    = d.duration || 800;
        const h      = dur / 2;
        const q      = dur / 4;
        const render = sc.renderAll.bind(sc);
        const ease   = fabric.util.ease;

        const oL   = obj.left;
        const oT   = obj.top;
        const oOp  = obj.opacity != null ? obj.opacity : 1;
        const oSX  = obj.scaleX  != null ? obj.scaleX  : 1;
        const oSY  = obj.scaleY  != null ? obj.scaleY  : 1;
        const oAng = obj.angle   != null ? obj.angle   : 0;

        function restore(delay = 0) {
            setTimeout(() => {
                obj.set({ left: oL, top: oT, opacity: oOp, scaleX: oSX, scaleY: oSY, angle: oAng });
                obj.setCoords();
                obj.dirty = true;
                sc.requestRenderAll();
            }, delay);
        }

        switch (d.type) {
            case 'fade':       obj.set('opacity',0); obj.animate('opacity',oOp,{duration:dur,onChange:render,onComplete:()=>restore()}); break;
            case 'fadeDown':   obj.set({opacity:0,top:oT-60}); obj.animate('opacity',oOp,{duration:dur,onChange:render}); obj.animate('top',oT,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'fadeUp':     obj.set({opacity:0,top:oT+60}); obj.animate('opacity',oOp,{duration:dur,onChange:render}); obj.animate('top',oT,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'fadeLeft':   obj.set({opacity:0,left:oL+60}); obj.animate('opacity',oOp,{duration:dur,onChange:render}); obj.animate('left',oL,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'fadeRight':  obj.set({opacity:0,left:oL-60}); obj.animate('opacity',oOp,{duration:dur,onChange:render}); obj.animate('left',oL,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'pop':        obj.set({scaleX:0.01,scaleY:0.01,opacity:0}); obj.animate({scaleX:oSX,scaleY:oSY},{duration:dur,easing:ease.easeOutBack,onChange:render}); obj.animate('opacity',oOp,{duration:h,onChange:render,onComplete:()=>restore()}); break;
            case 'zoomOut':    obj.set({scaleX:oSX*2.5,scaleY:oSY*2.5,opacity:0}); obj.animate({scaleX:oSX,scaleY:oSY},{duration:dur,easing:ease.easeOutCubic,onChange:render}); obj.animate('opacity',oOp,{duration:dur,onChange:render,onComplete:()=>restore()}); break;
            case 'slideL':     obj.set('left',oL+120); obj.animate('left',oL,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'slideR':     obj.set('left',oL-120); obj.animate('left',oL,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'slideU':     obj.set('top',oT+120); obj.animate('top',oT,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'slideD':     obj.set('top',oT-120); obj.animate('top',oT,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'dropIn':     obj.set({top:oT-300,opacity:0}); obj.animate('top',oT,{duration:dur,easing:ease.easeOutBounce,onChange:render}); obj.animate('opacity',oOp,{duration:h,onChange:render,onComplete:()=>restore()}); break;
            case 'riseUp':     obj.set({top:oT+300,opacity:0}); obj.animate('top',oT,{duration:dur,easing:ease.easeOutCubic,onChange:render}); obj.animate('opacity',oOp,{duration:h,onChange:render,onComplete:()=>restore()}); break;
            case 'flipX':      obj.set('scaleY',0.01); obj.animate('scaleY',oSY,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'flipY':      obj.set('scaleX',0.01); obj.animate('scaleX',oSX,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'rotateIn':   obj.set({angle:oAng-180,opacity:0,scaleX:0.3,scaleY:0.3}); obj.animate('angle',oAng,{duration:dur,easing:ease.easeOutCubic,onChange:render}); obj.animate('opacity',oOp,{duration:dur,onChange:render}); obj.animate({scaleX:oSX,scaleY:oSY},{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'swingIn':    obj.set({angle:oAng-45,opacity:0}); obj.animate('angle',oAng,{duration:dur,easing:ease.easeOutBack,onChange:render}); obj.animate('opacity',oOp,{duration:h,onChange:render,onComplete:()=>restore()}); break;
            case 'rollIn':     obj.set({left:oL-200,angle:oAng-120,opacity:0}); obj.animate('left',oL,{duration:dur,easing:ease.easeOutCubic,onChange:render}); obj.animate('angle',oAng,{duration:dur,easing:ease.easeOutCubic,onChange:render}); obj.animate('opacity',oOp,{duration:h,onChange:render,onComplete:()=>restore()}); break;
            case 'expandH':    obj.set('scaleX',0.01); obj.animate('scaleX',oSX,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'expandV':    obj.set('scaleY',0.01); obj.animate('scaleY',oSY,{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'bounce':     obj.animate('top',oT-50,{duration:h,easing:ease.easeOutCubic,onChange:render,onComplete:()=>obj.animate('top',oT,{duration:h,easing:ease.easeOutBounce,onChange:render,onComplete:()=>restore()})}); break;
            case 'bounceX':    obj.animate('left',oL+40,{duration:q,easing:ease.easeOutCubic,onChange:render,onComplete:()=>obj.animate('left',oL,{duration:h,easing:ease.easeOutBounce,onChange:render,onComplete:()=>restore()})}); break;
            case 'shake':      obj.animate('left',oL-12,{duration:60,onChange:render,onComplete:()=>obj.animate('left',oL+12,{duration:60,onChange:render,onComplete:()=>obj.animate('left',oL-10,{duration:60,onChange:render,onComplete:()=>obj.animate('left',oL+10,{duration:60,onChange:render,onComplete:()=>obj.animate('left',oL-6,{duration:60,onChange:render,onComplete:()=>obj.animate('left',oL,{duration:60,onChange:render,onComplete:()=>restore()})})})})})}); break;
            case 'shakeY':     obj.animate('top',oT-12,{duration:60,onChange:render,onComplete:()=>obj.animate('top',oT+12,{duration:60,onChange:render,onComplete:()=>obj.animate('top',oT-8,{duration:60,onChange:render,onComplete:()=>obj.animate('top',oT+8,{duration:60,onChange:render,onComplete:()=>obj.animate('top',oT,{duration:60,onChange:render,onComplete:()=>restore()})})})})}); break;
            case 'pulse':      obj.animate({scaleX:oSX*1.25,scaleY:oSY*1.25},{duration:h,onChange:render,onComplete:()=>obj.animate({scaleX:oSX,scaleY:oSY},{duration:h,onChange:render,onComplete:()=>restore()})}); break;
            case 'float':      obj.animate('top',oT-18,{duration:h,easing:ease.easeInOutSine,onChange:render,onComplete:()=>obj.animate('top',oT,{duration:h,easing:ease.easeInOutSine,onChange:render,onComplete:()=>restore()})}); break;
            case 'swing':      obj.animate('angle',oAng+20,{duration:q,easing:ease.easeOutSine,onChange:render,onComplete:()=>obj.animate('angle',oAng-16,{duration:q,easing:ease.easeInOutSine,onChange:render,onComplete:()=>obj.animate('angle',oAng+10,{duration:q,easing:ease.easeInOutSine,onChange:render,onComplete:()=>obj.animate('angle',oAng,{duration:q,easing:ease.easeOutSine,onChange:render,onComplete:()=>restore()})})})}); break;
            case 'wobble':     obj.animate('left',oL+20,{duration:q,onChange:render,onComplete:()=>obj.animate('angle',oAng-8,{duration:q,onChange:render,onComplete:()=>obj.animate('left',oL-15,{duration:q,onChange:render,onComplete:()=>obj.animate('angle',oAng+6,{duration:q,onChange:render,onComplete:()=>obj.animate('left',oL,{duration:q,onChange:render,onComplete:()=>obj.animate('angle',oAng,{duration:q,onChange:render,onComplete:()=>restore()})})})})})}); break;
            case 'tada':       obj.animate({scaleX:oSX*0.9,scaleY:oSY*0.9},{duration:q/2,onChange:render,onComplete:()=>obj.animate({scaleX:oSX*1.15,scaleY:oSY*1.15,angle:oAng-5},{duration:q,onChange:render,onComplete:()=>obj.animate({angle:oAng+5},{duration:q/2,onChange:render,onComplete:()=>obj.animate({angle:oAng-4},{duration:q/2,onChange:render,onComplete:()=>obj.animate({scaleX:oSX,scaleY:oSY,angle:oAng},{duration:q,onChange:render,onComplete:()=>restore()})})})})}); break;
            case 'jello':      obj.animate({scaleX:oSX*1.2,scaleY:oSY*0.85},{duration:q/2,onChange:render,onComplete:()=>obj.animate({scaleX:oSX*0.85,scaleY:oSY*1.15},{duration:q/2,onChange:render,onComplete:()=>obj.animate({scaleX:oSX*1.1,scaleY:oSY*0.92},{duration:q/2,onChange:render,onComplete:()=>obj.animate({scaleX:oSX,scaleY:oSY},{duration:q/2,onChange:render,onComplete:()=>restore()})})})}); break;
            case 'rubberBand': obj.animate({scaleX:oSX*1.4,scaleY:oSY*0.75},{duration:q,onChange:render,onComplete:()=>obj.animate({scaleX:oSX*0.8,scaleY:oSY*1.25},{duration:q,onChange:render,onComplete:()=>obj.animate({scaleX:oSX*1.1,scaleY:oSY*0.9},{duration:q,onChange:render,onComplete:()=>obj.animate({scaleX:oSX,scaleY:oSY},{duration:q,onChange:render,onComplete:()=>restore()})})})}); break;
            case 'heartbeat':  obj.animate({scaleX:oSX*1.3,scaleY:oSY*1.3},{duration:120,onChange:render,onComplete:()=>obj.animate({scaleX:oSX,scaleY:oSY},{duration:120,onChange:render,onComplete:()=>obj.animate({scaleX:oSX*1.2,scaleY:oSY*1.2},{duration:120,onChange:render,onComplete:()=>obj.animate({scaleX:oSX,scaleY:oSY},{duration:200,onChange:render,onComplete:()=>restore()})})})}); break;
            case 'flash':      obj.animate('opacity',0,{duration:q,onChange:render,onComplete:()=>obj.animate('opacity',oOp,{duration:q,onChange:render,onComplete:()=>obj.animate('opacity',0,{duration:q,onChange:render,onComplete:()=>obj.animate('opacity',oOp,{duration:q,onChange:render,onComplete:()=>restore()})})})}); break;
            case 'blink':      obj.animate('opacity',0,{duration:h,onChange:render,onComplete:()=>obj.animate('opacity',oOp,{duration:h,onChange:render,onComplete:()=>restore()})}); break;
            case 'spin':       obj.animate('angle',oAng+360,{duration:dur,easing:ease.easeInOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'spinReverse':obj.animate('angle',oAng-360,{duration:dur,easing:ease.easeInOutCubic,onChange:render,onComplete:()=>restore()}); break;
            case 'rockLeft':   obj.animate('angle',oAng-20,{duration:h,easing:ease.easeOutSine,onChange:render,onComplete:()=>obj.animate('angle',oAng,{duration:h,easing:ease.easeOutSine,onChange:render,onComplete:()=>restore()})}); break;
            case 'rockRight':  obj.animate('angle',oAng+20,{duration:h,easing:ease.easeOutSine,onChange:render,onComplete:()=>obj.animate('angle',oAng,{duration:h,easing:ease.easeOutSine,onChange:render,onComplete:()=>restore()})}); break;
            case 'sway':       obj.animate('left',oL+25,{duration:h,easing:ease.easeInOutSine,onChange:render,onComplete:()=>obj.animate('left',oL-25,{duration:dur,easing:ease.easeInOutSine,onChange:render,onComplete:()=>obj.animate('left',oL,{duration:h,easing:ease.easeInOutSine,onChange:render,onComplete:()=>restore()})})}); break;
            case 'vibrate': { let vt=0; const vSteps=Math.floor(dur/30); (function vStep(){if(vt>=vSteps){restore();return;} const offset=(vt%2===0)?4:-4; obj.animate('left',oL+offset,{duration:30,onChange:render,onComplete:vStep}); vt++;})(); break; }
            case 'fadeOut':    obj.animate('opacity',0,{duration:dur,onChange:render,onComplete:()=>restore(300)}); break;
            case 'shrink':     obj.animate({scaleX:0.01,scaleY:0.01,opacity:0},{duration:dur,easing:ease.easeInCubic,onChange:render,onComplete:()=>restore(300)}); break;
            case 'exitL':      obj.animate('left',oL-400,{duration:dur,easing:ease.easeInCubic,onChange:render,onComplete:()=>restore(300)}); break;
            case 'exitR':      obj.animate('left',oL+400,{duration:dur,easing:ease.easeInCubic,onChange:render,onComplete:()=>restore(300)}); break;
            case 'exitU':      obj.animate('top',oT-400,{duration:dur,easing:ease.easeInCubic,onChange:render,onComplete:()=>restore(300)}); break;
            case 'exitD':      obj.animate('top',oT+400,{duration:dur,easing:ease.easeInCubic,onChange:render,onComplete:()=>restore(300)}); break;
            case 'sinkDown':   obj.animate({top:oT+200,opacity:0},{duration:dur,easing:ease.easeInCubic,onChange:render,onComplete:()=>restore(300)}); break;
            case 'flyOff':     obj.animate({left:oL+500,top:oT-300,opacity:0,angle:oAng+45},{duration:dur,easing:ease.easeInCubic,onChange:render,onComplete:()=>restore(300)}); break;
            case 'explode':    obj.animate({scaleX:oSX*3,scaleY:oSY*3,opacity:0},{duration:dur,easing:ease.easeOutCubic,onChange:render,onComplete:()=>restore(300)}); break;
            case 'collapse':   obj.animate({scaleY:0.01},{duration:dur,easing:ease.easeInCubic,onChange:render,onComplete:()=>restore(300)}); break;
        }
    });
}



// ─── PAGE-FLIP FUNCTIONS ──────────────────────────────────────────────────────
// recenter, updateUI, buildDots, initFlip, goPrev, goNext are all at top-level
// so they are defined before initFlip calls them.
//
// Layout rules:
//   Odd  pages (e.g. 9): DOM gets 10 divs — page 9 duplicated at end
//     → 1(cover) | 2-3 | 4-5 | 6-7 | 8-9 | 9(back cover)
//   Even pages (e.g.10): DOM gets 10 divs — no duplication
//     → 1(cover) | 2-3 | 4-5 | 6-7 | 8-9 | 10(back cover)

let currentIdx = 0; // tracks current PageFlip index via flip event

function recenter(idx) {
    const bookEl = document.getElementById('book');
    if (!bookEl || !pageFlip) return;
    const total = pageFlip.getPageCount();
    if (idx === 0) {
        bookEl.style.transform = 'translateX(-210px)'; // front cover: shift left
    } else if (idx >= total - 1) {
        bookEl.style.transform = 'translateX(210px)';  // back cover: shift right
    } else {
        bookEl.style.transform = 'translateX(0px)';    // spreads: centred
    }
}

function updateUI(idx) {
    const ind = document.getElementById('pgInd');
    if (!ind || !pageFlip) return;
    const total = pageFlip.getPageCount();
    let label = '';
    if (idx === 0) {
        label = 'Page 1 (Front Cover)';
    } else if (idx >= total - 1) {
        label = `Page ${totalPages} (Back Cover)`;
    } else {
        const left  = idx + 1;
        const right = idx + 2;
        const rightIsReal = right <= totalPages;
        label = rightIsReal ? `Pages ${left} – ${right}` : `Page ${left}`;
    }
    ind.textContent = label;

    const allDots = document.querySelectorAll('.p-dot');
    let activeDot = 0;
    if (idx === 0) {
        activeDot = 0;
    } else if (idx >= total - 1) {
        activeDot = allDots.length - 1;
    } else {
        activeDot = Math.ceil(idx / 2);
    }
    allDots.forEach((d, i) => d.classList.toggle('a', i === activeDot));
}

function buildDots() {
    const wrap = document.getElementById('dotWrap');
    if (!wrap) return;
    wrap.innerHTML = '';
    const total = pageFlip.getPageCount();
    const dots = [0];
    for (let i = 1; i < total - 1; i += 2) dots.push(i);
    dots.push(total - 1);
    dots.forEach((targetIdx, vi) => {
        const d = document.createElement('button');
        d.className = 'p-dot' + (vi === 0 ? ' a' : '');
        d.onclick = () => { if (pageFlip) pageFlip.flip(targetIdx); };
        wrap.appendChild(d);
    });
}

function initFlip() {
    const bookEl = document.getElementById('book');

    pageFlip = new St.PageFlip(bookEl, {
        width: PAGE_W,
        height: PAGE_H,
        size: 'fixed',
        showCover: true,
        usePortrait: false,
        flippingTime: 800,
        drawShadow: true,
        maxShadowOpacity: 0.5,
        showPageCorners: true,
        useMouseEvents: true,
        clickEventForward: false
    });

    window.pageFlip = pageFlip;
    pageFlip.loadFromHTML(document.querySelectorAll('#book .my-page'));
    
    recenter(0);
    setTimeout(() => document.getElementById('loadOverlay').classList.add('hidden'), 500);

    pageFlip.on('changeState', e => {
        const book = document.getElementById('book');
        if (e.data === 'flipping') {
            book.classList.add('flipping');
        } else {
            book.classList.remove('flipping');
        }
    });

    pageFlip.on('flip', e => {
        currentIdx = e.data;
        const pageSound = document.getElementById("pageSound");
        if (pageSound) {
            pageSound.pause();
            pageSound.currentTime = 0.65;
            pageSound.play().catch(() => {});
        }
        recenter(e.data);
        updateUI(e.data);
        playPageAnimations(e.data);
        playPageAnimations(e.data + 1);

         if (glossEnabled) {
            const pages = document.querySelectorAll('#book .my-page');
            [e.data, e.data + 1].forEach((pi, i) => {
                if (pages[pi]) {
                    setTimeout(() => animateFlipShine(pages[pi]), i * 80);
                }
            });
        }
          document.getElementById('book').classList.remove('flipping');
    });

    pageFlip.on('flip', e => {
        const newPageIdx     = e.data;
        const newPageIdxNext = e.data + 1;
        Object.keys(pageVideos).forEach(pi => {
            const idx = parseInt(pi);
            if (idx !== newPageIdx && idx !== newPageIdxNext) stopPageVideos(idx);
        });
        setTimeout(() => {
            startPageVideos(newPageIdx);
            startPageVideos(newPageIdxNext);
        }, 820);
    });

    buildDots();
    updateUI(0);

    setTimeout(() => {
        playPageAnimations(0);
        playPageAnimations(1);
    }, 300);
}

function goPrev() {
    if (!pageFlip) return;
    const total = pageFlip.getPageCount();
    if (currentIdx <= 0) return;
    if (currentIdx >= total - 1) {
        pageFlip.flip(total - 2); // back cover → last spread
    } else {
        pageFlip.flipPrev();
    }
}

function goNext() {
    if (!pageFlip) return;
    const total = pageFlip.getPageCount();
    if (currentIdx >= total - 1) return;
    if (currentIdx >= total - 2) {
        pageFlip.flip(total - 1); // last spread → back cover
    } else {
        pageFlip.flipNext();
    }
}

async function saveAndShare() {
    const btn = document.querySelector('.cb-btn.pri');
    btn.textContent = '⏳ Saving...';
    btn.disabled = true;

    const currentBg = new URLSearchParams(window.location.search).get('bg') || '';
    // Get the real bg value (may be base64, stored in DB only)
    const realBg = document.body.style.backgroundImage.match(/url\(['"]?(data:[^'"]+)['"]?\)/)?.[1]
                || document.body.style.backgroundColor
                || currentBg;
    const isBase64 = realBg && realBg.startsWith('data:');

    const pathParts = window.location.pathname.split('/');
    const share_id  = pathParts[1] === 'preview' ? pathParts[2] : null;
    const pId       = new URLSearchParams(window.location.search).get('id');

    if (!share_id && !pId) {
        const shareUrl = new URL(window.location.href);
        // Don't add base64 to URL
        if (currentBg && !isBase64) shareUrl.searchParams.set('bg', currentBg);
        try {
            await navigator.clipboard.writeText(shareUrl.toString());
            btn.textContent = '✅ Link Copied!';
        } catch {
            btn.textContent = '⚠️ No Project ID';
        }
        setTimeout(() => { btn.textContent = '💾 Save & Share'; btn.disabled = false; }, 2500);
        return;
    }

    try {
        // Save the real bg (including base64) to DB
        await fetch('/api/projects/save-bg', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ share_id, project_id: pId, preview_bg: realBg })
        });

        const shareBase = share_id
            ? `${window.location.origin}/preview/${share_id}`
            : window.location.href;
        const shareUrl = new URL(shareBase);
        // Only add bg to URL if it's NOT base64 (gradients/colors are fine)
        if (currentBg && !isBase64) shareUrl.searchParams.set('bg', currentBg);

        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(shareUrl.toString());
            btn.textContent = '✅ Link Copied!';
        } else {
            btn.textContent = '✅ Saved!';
        }
    } catch(e) {
        btn.textContent = '❌ Failed';
        console.error(e);
    }

    setTimeout(() => { btn.textContent = '💾 Save & Share'; btn.disabled = false; }, 2500);
}

function setTxt(t) { document.getElementById('loadTxt').textContent = t; }
</script>
</body>
</html>
